services:
  postgres:
    image: pgvector/pgvector:16
    environment:
      POSTGRES_DB: month2
      POSTGRES_USER: month2
      POSTGRES_PASSWORD: month2
    ports:
      - "5432:5432"
    volumes:
      - pgdata_m2:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata_m2:/data

volumes:
  pgdata_m2:
  redisdata_m2:
