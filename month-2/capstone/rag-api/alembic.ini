[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# We will use the database_url from app.config in env.py, 
# but we can leave a placeholder here for generic tools.
sqlalchemy.url = postgresql+asyncpg://month2:month2@localhost:5432/month2

[post_write_hooks]
# hooks...

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
