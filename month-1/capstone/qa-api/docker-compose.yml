services:
  postgres:
    image: pgvector/pgvector:16
    environment:
      POSTGRES_DB: month1
      POSTGRES_USER: month1
      POSTGRES_PASSWORD: month1
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
